<div class="container py-5">
  <div class="row h-100">
    <div class="col-md-9">
      <h2>Cart</h2>
      <br />
      <div class="accordion" id="cartAccordion">

        <!-- GET CART -->
        <div class="accordion-item">
          <h2 class="accordion-header" id="form">
            <button
              class="accordion-button"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapse-form"
              aria-expanded="true"
              aria-controls="collapse-form"
            >
              A customer should see the current cart.
            </button>
          </h2>
          <div
            id="collapse-form"
            class="accordion-collapse collapse show"
            aria-labelledby="form"
            data-bs-parent="#cartAccordion"
          >
            <div class="accordion-body">
              <div class="d-flex justify-content-between align-items-center">
                <span><code>GET /in-store/storeKey/carts/id</code></span>
                <button class="btn btn-primary" onclick="getCart()">
                  Get Cart
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- UPDATE SHIPPING ADDRESS -->
        <div class="accordion-item">
          <h2 class="accordion-header" id="task2">
            <button
              class="accordion-button collapsed"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapse2"
              aria-expanded="false"
              aria-controls="collapse2"
            >
              A customer wants to update the shipping address.
            </button>
          </h2>
          <div
            id="collapse2"
            class="accordion-collapse collapse"
            aria-labelledby="task2"
            data-bs-parent="#cartAccordion"
          >
            <div class="accordion-body">
              <span>
                UPDATE CART -
                <code>POST /in-store/storeKey/carts/id/shipping-address</code>
              </span><br /><br />

              <form id="new-address-form">
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="firstName" class="form-label">First Name</label>
                  </div>
                  <div class="col-md-8">
                    <input type="text" class="form-control" id="firstName" name="firstName" required />
                  </div>
                </div>
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="lastName" class="form-label">Last Name</label>
                  </div>
                  <div class="col-md-8">
                    <input type="text" class="form-control" id="lastName" name="lastName" required />
                  </div>
                </div>
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="streetNumber" class="form-label">Street Number</label>
                  </div>
                  <div class="col-md-8">
                    <input type="text" class="form-control" id="streetNumber" name="streetNumber" required />
                  </div>
                </div>
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="streetName" class="form-label">Street Name</label>
                  </div>
                  <div class="col-md-8">
                    <input type="text" class="form-control" id="streetName" name="streetName" required />
                  </div>
                </div>
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="region" class="form-label">State</label>
                  </div>
                  <div class="col-md-8">
                    <input type="text" class="form-control" id="region" name="region" required />
                  </div>
                </div>
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="city" class="form-label">City</label>
                  </div>
                  <div class="col-md-8">
                    <input type="text" class="form-control" id="city" name="city" required />
                  </div>
                </div>
                <div class="row mb-2">
                  <div class="col-md-4">
                    <label for="country" class="form-label">Country</label>
                  </div>
                  <div class="col-md-8">
                    <select class="form-select" id="country" name="country" required>
                      <!-- Dynamically populated -->
                    </select>
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="col-md-4">
                    <label for="email" class="form-label">Email</label>
                  </div>
                  <div class="col-md-8">
                    <input type="email" class="form-control" id="email" name="email" required />
                  </div>
                </div>
                <button type="button" class="btn btn-primary" onclick="updateShippingAddress()">
                  Add Shipping Address
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- CHOOSE SHIPPING METHOD -->
        <div class="accordion-item">
          <h2 class="accordion-header" id="task3">
            <button
              class="accordion-button collapsed"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapse3"
              aria-expanded="false"
              aria-controls="collapse3"
            >
              A customer wants to choose a shipping method.
            </button>
          </h2>
          <div
            id="collapse3"
            class="accordion-collapse collapse"
            aria-labelledby="task3"
            data-bs-parent="#cartAccordion"
          >
            <div class="accordion-body">
              <span>
                GET SHIPPING METHODS -
                <code>GET /in-store/storeKey/shipping-methods/matching-cart</code>
              </span><br /><br />
              <span>
                UPDATE CART -
                <code>POST /in-store/storeKey/carts/{cartId}/shipping-methods</code>
              </span><br /><br />

              <div id="shippingMethodsContainer" class="mb-3">
                <!-- Shipping method radio buttons will go here -->
              </div>

              <button class="btn btn-primary" onclick="setShippingMethod()">
                Set Selected Shipping Method
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- JSON Response -->
      <br />
      <main class="d-flex flex-column min-vh-100">
        <div class="container-fluid h-100">
          <div class="row h-100">
            <div class="col-12 d-flex flex-column">
              <pre id="json-response" class="flex-fill overflow-auto mt-3 p-3 border rounded"></pre>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>


<script>
  function populateCountries() {
    const countriesList = localStorage.getItem('countriesList');
    const select = document.getElementById('country');
    select.innerHTML = '';

    if (countriesList) {
      const countries = JSON.parse(countriesList);
      countries.forEach((countryCode, index) => {
        const option = document.createElement('option');
        option.value = countryCode;
        option.textContent = countryCode;
        if (index === 0) option.selected = true; // Explicitly set first one
        select.appendChild(option);
      });
    }
  }

  countries.then((_) => {
    populateCountries();
  });

  // Listen for when the shipping methods accordion is shown
  document
    .getElementById('collapse3')
    .addEventListener('shown.bs.collapse', fetchShippingMethods);

  function fetchShippingMethods() {
    const container = document.getElementById('shippingMethodsContainer');
    container.innerHTML = '';
    const jsonResponseDiv = document.getElementById('json-response');
    jsonResponseDiv.textContent = '';

    const cartId = localStorage.getItem('cartId');
    const storeKey = localStorage.getItem('store');

    if (storeKey && cartId) {
      fetch(
        `/api/shipping-methods/in-store/${storeKey}/matching-cart?cartId=${cartId}`,
      )
        .then(handleResponse)
        .then((methods) => {
          console.log('Shipping Methods:', methods);
          jsonResponseDiv.textContent = JSON.stringify(methods, null, 2);

          methods.results.forEach((method, index) => {
            const div = document.createElement('div');
            div.className = 'form-check';

            const radio = document.createElement('input');
            radio.className = 'form-check-input';
            radio.type = 'radio';
            radio.name = 'shippingMethod';
            radio.id = `shippingMethod${index}`;
            radio.value = method.id;
            // ✅ Select the first shipping method by default
            if (index === 0) radio.checked = true;

            const label = document.createElement('label');
            label.className = 'form-check-label';
            label.htmlFor = radio.id;
            label.textContent = method.name || 'Unnamed shipping method';

            div.appendChild(radio);
            div.appendChild(label);
            container.appendChild(div);
          });
        })
        .catch((error) => {
          console.error('Error:', error);
          jsonResponseDiv.textContent = error.message;
        });
    } else {
      jsonResponseDiv.textContent = 'No current active cart';
    }
  }

  function getCart() {
    const jsonResponseDiv = document.getElementById('json-response');
    jsonResponseDiv.textContent = '';

    let cartId = localStorage.getItem('cartId');
    let storeKey = localStorage.getItem('store');

    if (storeKey && cartId) {
      fetch(`/api/in-store/${storeKey}/carts/${cartId}`)
        .then(handleResponse)
        .then((cart) => {
          console.log('Success:', cart);
          jsonResponseDiv.textContent = JSON.stringify(cart, null, 2);
        })
        .catch((error) => {
          console.error('Error:', error);
          jsonResponseDiv.textContent = error.message;
        });
    } else {
      jsonResponseDiv.textContent = 'No current active cart';
    }
  }

  function updateShippingAddress() {
    const jsonResponseDiv = document.getElementById('json-response');
    jsonResponseDiv.textContent = '';

    let cartId = localStorage.getItem('cartId');
    let storeKey = localStorage.getItem('store');

    if (storeKey && cartId) {
      const formData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        streetNumber: document.getElementById('streetNumber').value,
        streetName: document.getElementById('streetName').value,
        city: document.getElementById('city').value,
        region: document.getElementById('region').value,
        country: document.getElementById('country').value,
        email: document.getElementById('email').value,
      };
      fetch(`/api/in-store/${storeKey}/carts/${cartId}/shipping-address`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(formData),
      })
        .then(handleResponse)
        .then((data) => {
          console.log('Success:', data);
          jsonResponseDiv.textContent = JSON.stringify(data, null, 2);
        })
        .catch((error) => {
          console.error('Error:', error);
          jsonResponseDiv.textContent = error.message;
        });
    } else {
      jsonResponseDiv.textContent = 'No current active cart';
    }
  }

  function setShippingMethod() {
    const selected = document.querySelector(
      'input[name="shippingMethod"]:checked',
    );
    const container = document.getElementById('json-response');
    container.textContent = '';

    if (!selected) {
      container.textContent = 'Please select a shipping method first.';
      return;
    }

    const shippingMethodId = selected.value;
    const cartId = localStorage.getItem('cartId');
    const storeKey = localStorage.getItem('store');

    if (storeKey && cartId) {
      fetch(`/api/in-store/${storeKey}/carts/${cartId}/shipping-method`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ shippingMethodId }),
      })
        .then(handleResponse)
        .then((data) => {
          console.log('Set shipping method:', data);
          container.textContent = JSON.stringify(data, null, 2);
        })
        .catch((error) => {
          console.error('Error:', error);
          container.textContent = error.message;
        });
    } else {
      container.textContent = 'No current active cart';
    }
  }
</script>
