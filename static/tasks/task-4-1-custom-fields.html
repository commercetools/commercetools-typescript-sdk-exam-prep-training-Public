<div class="container-fluid py-5">
  <div class="row h-100">
    <div class="col-md-9">
      <h2>Custom Fields</h2>
      <div class="accordion" id="typeAccordion">
        <div class="accordion" id="typeAccordion">
          <div class="accordion" id="typeAccordion">
            <!-- Top accordion - open by default -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="task2">
                <button
                  class="accordion-button"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#collapse2"
                  aria-expanded="true"
                  aria-controls="collapse2"
                >
                  Create Custom Type.
                </button>
              </h2>
              <div
                id="collapse2"
                class="accordion-collapse collapse show"
                aria-labelledby="task2"
                data-bs-parent="#typeAccordion"
              >
                <div class="accordion-body">
                  <span>CREATE TYPE - <code>POST /types</code></span
                  ><br /><br />
                  <button class="btn btn-primary" onclick="createType()">
                    Create Type
                  </button>
                </div>
              </div>
            </div>

            <!-- Bottom accordion - closed by default -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="task1">
                <button
                  class="accordion-button collapsed"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#collapse1"
                  aria-expanded="false"
                  aria-controls="collapse1"
                >
                  Customers and Orders must have a custom field to store custom bonus points.
                </button>
              </h2>
              <div
                id="collapse1"
                class="accordion-collapse collapse"
                aria-labelledby="task1"
                data-bs-parent="#typeAccordion"
              >
                <div class="accordion-body">
                  <span>UPDATE CUSTOMER - <code>POST /customers/key</code></span
                  ><br /><br />
                  <div class="mb-3">
                    <label for="customer-key" class="form-label"
                      >Customer (read only)</label
                    >
                    <input
                      type="text"
                      class="form-control mb-2 me-2"
                      id="customer-key"
                      placeholder="Customer Key"
                      readonly
                    />
                  </div>

                  <div class="mb-3">
                    <label for="points" class="form-label"
                      >Welcome points:</label
                    >
                    <input
                      type="text"
                      class="form-control mb-2 me-2"
                      id="points"
                      placeholder=100
                    />
                  </div>

                  <button
                    class="btn btn-primary"
                    onclick="addWelcomeBonus()"
                  >
                    Update Customer
                  </button>
                </div>
              </div>
            </div>
          </div>

          <br /><br />
          <main class="d-flex flex-nowrap">
            <div class="row h-100">
              <div class="d-flex col-md-12">
                <div class="container col-md-12">
                  <pre
                    id="json-response"
                    class="mt-1 flex-fill d-flex overflow-auto"
                  ></pre>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>

      <script>
        function displayCustomerKey(event) {
          let customerKey = localStorage.getItem('customerKey');

          if (customerKey) event.target.value = customerKey;
          else event.target.value = 'Customer is not logged in';
        }

        if (typeof customerKeyInput === 'undefined') {
          let customerKeyInput = document.getElementById('customer-key');
          customerKeyInput.addEventListener('focus', displayCustomerKey);
        }

        function addWelcomeBonus() {
          const jsonResponseDiv = document.getElementById('json-response');
          jsonResponseDiv.textContent = '';

          const storeKey = localStorage.getItem('store');
          const customerKey = localStorage.getItem('customerKey');

          let formData = {
            points: Number(document.getElementById('points').value)
          };

          fetch(
            `/api/in-store/${storeKey}/customers/${customerKey}/custom-fields`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(formData),
            },
          )
            .then(handleResponse)
            .then((data) => {
              console.log('Success:', data);
              jsonResponseDiv.textContent = JSON.stringify(data, null, 2);
            })
            .catch((error) => {
              console.error('Error:', error);
              jsonResponseDiv.textContent = error.message;
            });
        }

        function createType() {
          const jsonResponseDiv = document.getElementById('json-response');
          jsonResponseDiv.textContent = '';

          fetch('/api/extensions/types', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
          })
            .then(handleResponse)
            .then((data) => {
              console.log('Success:', data);
              jsonResponseDiv.textContent = JSON.stringify(data, null, 2);
            })
            .catch((error) => {
              console.error('Error:', error);
              jsonResponseDiv.textContent = error.message;
            });
        }
      </script>
    </div>
  </div>
</div>
